version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: niff_stellar_db
    environment:
      POSTGRES_USER: niff_user
      POSTGRES_PASSWORD: niff_password
      POSTGRES_DB: niff_stellar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U niff_user -d niff_stellar"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: